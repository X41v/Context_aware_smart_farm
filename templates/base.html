<!DOCTYPE html>
<html>
<head>
    <title>Smart Farm Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body{
            font-family:Arial;
            margin:0;
            display:flex;
            background:#f4f6f9;
        }

        #sidebar{
            width:200px;
            background:#1f2937;
            color:white;
            padding:15px;
            min-height:100vh;
        }

        #sidebar h2{
            font-size:18px;
            margin-bottom:10px;
        }

        #sidebar a{
            display:block;
            color:white;
            text-decoration:none;
            padding:8px 0;
        }

        #sidebar a:hover{
            background:#374151;
            border-radius:4px;
        }

        #main{
            flex:1;
            padding:20px;
        }

        .sensor-card{
            padding:10px;
            margin-bottom:8px;
            border-radius:6px;
            font-size:14px;
        }

        .green{background:#16a34a;}
        .yellow{background:#ca8a04;}
        .red{background:#dc2626;}

        textarea{
            width:100%;
            height:200px;
            margin-top:5px;
        }

        button{
            padding:6px 12px;
            margin-top:5px;
            cursor:pointer;
        }

        #weather-data{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
            gap:10px;
        }

        .weather-card{
            background:white;
            padding:10px;
            border-radius:8px;
            box-shadow:0 2px 6px rgba(0,0,0,0.2);
        }

        #alerts{
            color:red;
            font-weight:bold;
        }

        canvas{
            background:white;
            padding:10px;
            border-radius:8px;
            margin-bottom:20px;
        }

    </style>
</head>
<body>

<div id="sidebar">
    <h2>Smart Farm</h2>
    <a href="{{ url_for('home') }}">Home</a>
    <a href="{{ url_for('settings') }}">Settings</a>
    <a href="{{ url_for('analytics') }}">Analytics</a>
</div>

<div id="main">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
